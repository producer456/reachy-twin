<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Reachy Twin Control</title>
<style>
  :root{
    --bg:#0c0e16; --panel:#151826; --line:#262a3d; --txt:#e7ecff; --dim:#8b91b5;
    --claude:#46e0ff; --marcus:#ff5d8f; --ok:#54e08a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.4 system-ui,Segoe UI,sans-serif;
       display:flex;flex-direction:column;height:100vh;height:100dvh}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);
         background:linear-gradient(90deg,#101324,#161a2e)}
  header h1{font-size:17px;margin:0;letter-spacing:.5px}
  header h1 b{color:var(--claude)} header h1 i{color:var(--marcus);font-style:normal}
  .status{margin-left:auto;display:flex;gap:14px;align-items:center;font-size:13px;color:var(--dim);flex-wrap:wrap}
  .dot.err{background:var(--marcus);box-shadow:0 0 8px var(--marcus)}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;background:#444;margin-right:5px}
  .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .badge{padding:3px 10px;border-radius:20px;font-weight:600;font-size:12px;border:1px solid var(--line)}
  .badge.claude{color:var(--claude);border-color:var(--claude)}
  .badge.marcus{color:var(--marcus);border-color:var(--marcus)}
  main{flex:1;display:flex;min-height:0}
  #log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:78%;padding:9px 13px;border-radius:14px;white-space:pre-wrap}
  .msg.you{align-self:flex-end;background:#222842}
  .msg.claude{align-self:flex-start;background:#0d2a33;border:1px solid var(--claude)}
  .msg.marcus{align-self:flex-start;background:#33121f;border:1px solid var(--marcus)}
  .msg.system{align-self:center;color:var(--dim);font-size:12px;background:none}
  .who{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.7;margin-bottom:2px}
  aside{width:clamp(240px,26vw,300px);border-left:1px solid var(--line);background:var(--panel);padding:16px;
        display:flex;flex-direction:column;gap:18px;overflow-y:auto}
  /* groups must never flex-shrink into each other — the aside scrolls instead */
  aside .grp{flex:0 0 auto}
  aside .grp.fill{flex:1 1 auto;min-height:170px;display:flex;flex-direction:column}
  .cam{width:100%;border-radius:8px;border:1px solid var(--line);margin-top:8px;display:none;background:#000}
  .jog{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
  .jog button{padding:8px 0;font-size:13px}
  .jog .sp{visibility:hidden}
  .jog2{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:5px}
  .jog2 button{padding:8px 0;font-size:12px;min-width:0;white-space:nowrap}
  .servos{display:none;margin-top:8px;font-size:13px;font-family:ui-monospace,monospace}
  .servos .sv{display:flex;justify-content:space-between;padding:2px 0}
  .servos .sv span:first-child{color:var(--dim)}
  .servos .sv.moving span{color:var(--marcus);font-weight:600}
  .grp label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim)}
  .row{display:flex;gap:8px;margin-top:8px}
  button{cursor:pointer;border:1px solid var(--line);background:#1c2138;color:var(--txt);
         padding:9px 12px;border-radius:9px;font-size:14px;flex:1;min-width:0;transition:.15s;
         touch-action:manipulation} /* no double-tap zoom-pan when tapping fast on iOS */
  button:hover{border-color:#3a4160}
  button.sel.claude{background:var(--claude);color:#022;border-color:var(--claude)}
  button.sel.marcus{background:var(--marcus);color:#201;border-color:var(--marcus)}
  button.mic.on{background:var(--ok);color:#022;border-color:var(--ok)}
  input[type=range]{width:100%}
  .tabs{display:flex;gap:6px;margin:8px 0}
  .tabs button{padding:6px 8px;font-size:13px}
  .tabs button.on{background:#2a3150;border-color:var(--claude);color:var(--claude)}
  .chips{flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;min-height:0}
  .chip{flex:0 0 auto;padding:6px 10px;font-size:12px;border:1px solid var(--line);border-radius:14px;
        background:#1a1f33;cursor:pointer;transition:.12s;touch-action:manipulation}
  .chip:hover{border-color:var(--marcus);color:var(--marcus)}
  .chip:active{transform:scale(.94)}
  .behaviors{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .bh{width:100%;text-align:left}
  .bh.on{background:var(--ok);color:#022;border-color:var(--ok)}
  .bh:disabled{opacity:.4;cursor:not-allowed}
  footer{display:flex;gap:10px;padding:12px 18px;border-top:1px solid var(--line);background:var(--panel);
         padding-bottom:calc(12px + env(safe-area-inset-bottom))}
  #text{flex:1;background:#0e1120;border:1px solid var(--line);color:var(--txt);border-radius:10px;
        padding:11px 14px;font-size:16px} /* 16px: stops iOS Safari zooming the page on focus */
  #send{flex:0 0 auto;width:90px;background:var(--claude);color:#022;border:none;font-weight:600}
  @media (pointer:coarse){
    button{padding:11px 12px}
    .chip{padding:9px 12px;font-size:13px}
  }
  /* phones only: stack the controls under the chat. Kept below iPad-with-Page-Zoom
     widths (10.5" portrait at 125% zoom = 667px) so the iPad always stays two-pane. */
  @media (max-width:540px){
    main{flex-direction:column}
    aside{width:100%;border-left:none;border-top:1px solid var(--line);max-height:48dvh}
  }
</style>
</head>
<body>
<header>
  <h1>Reachy <b>Twin</b> <span style="color:var(--dim)">·</span> <i>♥</i> Control</h1>
  <div class="status">
    <span>active <span id="activeBadge" class="badge claude">claude</span></span>
    <span id="robotWrap" title=""><span id="robotDot" class="dot"></span>robot</span>
    <span><span id="micDot" class="dot"></span>mic</span>
    <span id="vol">vol —</span>
    <span id="sleepBadge" style="display:none">💤</span>
    <span id="power" title="Total system power" style="color:#8aa">⚡ —</span>
  </div>
</header>
<main>
  <div id="log"></div>
  <aside>
    <div class="grp">
      <label>Brain</label>
      <div class="row">
        <button id="bClaude" class="sel claude" onclick="setBrain('claude')">Claude</button>
        <button id="bMarcus" onclick="setBrain('marcus')">Marcus</button>
      </div>
    </div>
    <div class="grp">
      <label>Microphone (ears)</label>
      <div class="row"><button id="micBtn" class="mic" onclick="toggleMic()">Start listening</button></div>
    </div>
    <div class="grp">
      <label>Volume <span id="volNum" style="color:var(--txt)"></span></label>
      <input id="volSlider" type="range" min="0" max="100" value="60"
             oninput="volNum.textContent=this.value" onchange="setVol(this.value)">
    </div>
    <div class="grp">
      <label>Behaviors</label>
      <div class="behaviors">
        <button id="bhTurn" class="bh" onclick="toggleBh('turn_to_sound')">Turn to sound</button>
        <button id="bhEmo" class="bh" onclick="toggleBh('emotions_on_cue')">Emotions on cue</button>
        <button id="bhFace" class="bh" onclick="toggleBh('face_track')">Face-track</button>
        <button id="bhIdle" class="bh" onclick="toggleBh('idle_motion')">Idle motion</button>
      </div>
    </div>
    <div class="grp">
      <label>Room memory <span id="roomStat" style="color:#888;font-weight:400"></span></label>
      <div class="behaviors">
        <button id="bhRoom" class="bh" onclick="toggleBh('room_memory')">Remember the room</button>
        <button id="bhWatch" class="bh" onclick="toggleWatch()">Watch the window</button>
      </div>
      <div class="row" style="margin-top:6px;align-items:center;gap:8px">
        <button id="missBtn" onclick="whatDidIMiss()">What did I miss?</button>
        <label style="color:#888;font-size:12px">Keep
          <select id="roomHrs" onchange="setRetention(this.value)">
            <option value="1">1h</option><option value="4">4h</option>
            <option value="8">8h</option><option value="12" selected>12h</option><option value="24">24h</option>
          </select>
        </label>
      </div>
      <div id="missOut" style="margin-top:6px;color:#cbd; font-size:13px; line-height:1.4"></div>
    </div>
    <div class="grp">
      <label>Camera &amp; Move</label>
      <div class="row">
        <button id="camBtn" onclick="toggleCam('/api/snapshot','camBtn','Show robot camera')">Show robot camera</button>
        <button id="ipadCamBtn" onclick="toggleCam('/api/ipad_snapshot','ipadCamBtn','Show iPad camera')">Show iPad camera</button>
      </div>
      <img id="cam" class="cam">
      <div class="jog">
        <button class="sp"></button>
        <button onclick="jog('pitch',-10)">Head &uarr;</button>
        <button class="sp"></button>
        <button onclick="jog('yaw',10)">&larr;</button>
        <button onclick="center()">Center</button>
        <button onclick="jog('yaw',-10)">&rarr;</button>
        <button class="sp"></button>
        <button onclick="jog('pitch',10)">Head &darr;</button>
        <button class="sp"></button>
      </div>
      <div class="jog2">
        <button onclick="jog('body',15)">Body &larr;</button>
        <button onclick="jog('body',-15)">Body &rarr;</button>
        <button onclick="jog('ant',15)">Ant &uarr;</button>
        <button onclick="jog('ant',-15)">Ant &darr;</button>
      </div>
    </div>
    <div class="grp">
      <label>Servos</label>
      <div class="row"><button id="servoBtn" onclick="toggleServos()">Show servo activity</button></div>
      <div id="servos" class="servos"></div>
    </div>
    <div class="grp fill">
      <label>Expressions</label>
      <div class="tabs">
        <button id="tabEmotions" class="on" onclick="showMoves('emotions')">Emotions</button>
        <button id="tabDances" onclick="showMoves('dances')">Dances</button>
      </div>
      <div id="chips" class="chips"></div>
    </div>
  </aside>
</main>
<footer>
  <input id="text" placeholder="Type to the active brain... (he'll speak the reply)"
         onkeydown="if(event.key==='Enter')send()">
  <button id="send" onclick="send()">Send</button>
</footer>
<script>
let dragging=false, lastLogLen=-1;
const $=id=>document.getElementById(id);
$('volSlider').addEventListener('pointerdown',()=>dragging=true);
$('volSlider').addEventListener('pointerup',()=>dragging=false);
$('volSlider').addEventListener('pointercancel',()=>dragging=false);

async function api(path,body){
  const o={method:body?'POST':'GET'};
  if(body){o.headers={'Content-Type':'application/json'};o.body=JSON.stringify(body)}
  return (await fetch(path,o)).json();
}
function renderLog(log){
  if(log.length===lastLogLen) return; lastLogLen=log.length;
  const el=$('log');
  // only follow the tail if the user was already at the bottom -- a forced scroll
  // mid-read (or while using the side menu) yanks the view back to the chat
  const pinned = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
  el.innerHTML='';
  for(const m of log){
    const d=document.createElement('div'); d.className='msg '+m.who;
    if(m.who!=='system'){const w=document.createElement('div');w.className='who';w.textContent=m.who;d.appendChild(w);}
    d.appendChild(document.createTextNode(m.text)); el.appendChild(d);
  }
  if(pinned) el.scrollTop=el.scrollHeight;
}
function setActiveBadge(b){
  const el=$('activeBadge'); el.textContent=b; el.className='badge '+b;
  $('bClaude').className=(b==='claude'?'sel claude':'');
  $('bMarcus').className=(b==='marcus'?'sel marcus':'');
}
async function refresh(){
  try{
    const s=await api('/api/state');
    setActiveBadge(s.active);
    $('micDot').className='dot'+(s.listening?' on':'');
    $('micBtn').className='mic'+(s.listening?' on':''); $('micBtn').textContent=s.listening?'Stop listening':'Start listening';
    if(s.volume!=null){$('vol').textContent='vol '+s.volume; if(!dragging){$('volSlider').value=s.volume;$('volNum').textContent=s.volume;}}
    if(s.behaviors){
      $('bhTurn').className='bh'+(s.behaviors.turn_to_sound?' on':'');
      $('bhEmo').className='bh'+(s.behaviors.emotions_on_cue?' on':'');
      $('bhFace').className='bh'+(s.behaviors.face_track?' on':'');
      $('bhIdle').className='bh'+(s.behaviors.idle_motion?' on':'');
      $('bhRoom').className='bh'+(s.behaviors.room_memory?' on':'');
    }
    $('bhWatch').className='bh'+(s.watch==='window'?' on':'');
    $('bhWatch').textContent=(s.watch==='window'?'Watching window':'Watch the window');
    if(s.room){
      $('roomStat').textContent=s.room.event_count?('· '+s.room.event_count+' noted'):'';
      if(!hrsTouched){const o=[...$('roomHrs').options].find(x=>+x.value===s.room.retention_hours); if(o)$('roomHrs').value=o.value;}
    }
    $('robotDot').className='dot'+(s.robot==='connected'?' on':' err');
    $('robotWrap').title=s.robot_error||'';
    $('sleepBadge').style.display=s.asleep?'inline':'none';
    renderLog(s.log);
  }catch(e){}
}
async function send(){
  const t=$('text').value.trim(); if(!t)return; $('text').value='';
  await api('/api/chat',{text:t}); refresh();
}
async function setBrain(b){ await api('/api/brain',{brain:b}); refresh(); }
async function toggleMic(){ const s=await api('/api/state'); await api('/api/listen',{on:!s.listening}); refresh(); }
async function setVol(v){ await api('/api/volume',{volume:parseInt(v)}); }
let MOVES={emotions:[],dances:[]}, moveTab='emotions';
async function loadMoves(){ try{ MOVES=await api('/api/moves'); showMoves(moveTab); }catch(e){} }
function showMoves(tab){
  moveTab=tab;
  $('tabEmotions').className=(tab==='emotions'?'on':'');
  $('tabDances').className=(tab==='dances'?'on':'');
  const c=$('chips'); c.innerHTML='';
  const kind=(tab==='emotions'?'emotion':'dance');
  for(const n of (MOVES[tab]||[])){
    const b=document.createElement('div'); b.className='chip'; b.textContent=n;
    b.onclick=()=>playMove(kind,n); c.appendChild(b);
  }
}
async function playMove(kind,name){ try{ await api('/api/move',{kind,name}); }catch(e){} }
async function toggleBh(name){ try{ const s=await api('/api/state'); await api('/api/behavior',{name,on:!s.behaviors[name]}); refresh(); }catch(e){} }
let hrsTouched=false;
async function toggleWatch(){ try{ const s=await api('/api/state'); await api('/api/watch',{mode:(s.watch==='window'?'off':'window')}); refresh(); }catch(e){} }
async function setRetention(h){ hrsTouched=true; try{ await api('/api/room',{retention_hours:parseInt(h)}); }catch(e){} }
async function whatDidIMiss(){
  const o=$('missOut'); const b=$('missBtn');
  o.textContent='…'; b.disabled=true;
  try{ const r=await api('/api/room/recall',{}); o.textContent=r.text||'(nothing)'; }
  catch(e){ o.textContent='Could not reach Reachy.'; }
  b.disabled=false; refresh();
}
let camTimer=null, camSource=null;
function toggleCam(source, btnId, showLabel){
  const img=$('cam'); const btn=$(btnId);
  if(camTimer && camSource===source){
    clearInterval(camTimer); camTimer=null; camSource=null;
    img.style.display='none'; img.removeAttribute('src'); btn.textContent=showLabel; return;
  }
  if(camTimer){ clearInterval(camTimer); }
  ['camBtn','ipadCamBtn'].forEach(id=>{ const b=$(id); if(b) b.textContent = id===btnId ? 'Hide camera' : (id==='camBtn'?'Show robot camera':'Show iPad camera'); });
  camSource = source;
  img.style.display='block';
  camTimer=setInterval(()=>{ img.src=source+'?t='+Date.now(); }, 250);
}
async function jog(part,delta){ try{ await api('/api/jog',{part,delta}); }catch(e){} }
async function center(){ try{ await api('/api/center',{x:1}); }catch(e){} }
let servoTimer=null, lastServo={};
function toggleServos(){
  const el=$('servos');
  if(servoTimer){ clearInterval(servoTimer); servoTimer=null; el.style.display='none'; $('servoBtn').textContent='Show servo activity'; return; }
  el.style.display='block'; $('servoBtn').textContent='Hide servo activity';
  servoTimer=setInterval(pollServos,350); pollServos();
}
async function pollServos(){
  try{
    const s=await api('/api/servos');
    const rows=[['mode',s.mode],['body yaw',s.body_yaw==null?'-':s.body_yaw+'°'],
                ['antenna L',s.antenna_left==null?'-':s.antenna_left+'°'],
                ['antenna R',s.antenna_right==null?'-':s.antenna_right+'°']];
    $('servos').innerHTML = rows.map(([k,v])=>{
      const moved = (k in lastServo) && lastServo[k]!==v && k.indexOf('antenna')===0;
      lastServo[k]=v;
      return `<div class="sv${moved?' moving':''}"><span>${k}</span><span>${v}</span></div>`;
    }).join('');
  }catch(e){}
}
async function pollPower(){
  try{
    const p=await api('/api/power'); const el=$('power');
    if(p.total_w==null){ el.textContent='⚡ —'; return; }
    const parts=[]; if(p.mac_w!=null)parts.push('Mac '+p.mac_w); if(p.vr2_w!=null)parts.push('vr-2 '+p.vr2_w);
    el.textContent='⚡ '+p.total_w+'W'+(parts.length?' ('+parts.join(' · ')+')':'');
    el.title='Total system power'+(p.mac_available?'':' — Mac not metered yet (run the powermetrics sudoers line)')+(p.vr2&&p.vr2.cost_per_month!=null?' · vr-2 ~$'+p.vr2.cost_per_month+'/mo':'');
  }catch(e){}
}
setInterval(refresh,1500); refresh(); loadMoves();
setInterval(pollPower,5000); pollPower();
</script>
</body>
</html>
